name: CI Build Pipeline

on:
 workflow_dispatch:

jobs:
  build:
    runs-on: React

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest .
          docker tag ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest ${{ secrets.DOCKER_USERNAME }}/cicd-demo:${{ github.sha }}

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/cicd-demo:${{ github.sha }}
  deploy:
    runs-on: React
    needs: build
    if: github.ref == 'refs/heads/main'


    steps:
      - name: Deploy container locally
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/cicd-demo:${{ github.sha }}
          docker stop cicd-demo || true
          docker rm cicd-demo || true
          docker run -d --name cicd-demo -p 3002:80 \ --restart unless-stopped \ ${{ secrets.DOCKER_USERNAME }}/cicd-demo:${{ github.sha }}




