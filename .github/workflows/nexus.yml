name: React Static CI/CD

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, macOS, react-2-do]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          # Cache is removed here to prevent the 650MB timeout hang

      - name: Install dependencies
        # --prefer-offline uses the runner's local npm cache instead of downloading
        run: npm ci --prefer-offline --no-audit

      - name: Build React App
        run: npm run build
        env:
          CI: false

      - name: Package build (Contents only)
        # We 'cd' into build so the zip doesn't contain a top-level 'build/' folder
        run: |
          cd build && zip -r ../react-build-${{ github.sha }}.zip .

      - name: Upload to Nexus
        run: |
          curl -v -u ${{ secrets.NEXUS_USERNAME }}:${{ secrets.NEXUS_PASSWORD }} \
          --upload-file react-build-${{ github.sha }}.zip \
          ${{ secrets.NEXUS_URL }}/react-build-${{ github.sha }}.zip

      - name: Upload build artifact (GitHub Backup)
        uses: actions/upload-artifact@v4
        with:
          name: react-build-${{ github.sha }}
          path: build

  deploy:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Download artifact from Nexus
        run: |
          curl -u ${{ secrets.NEXUS_USERNAME }}:${{ secrets.NEXUS_PASSWORD }} \
          -o react-build.zip \
          ${{ secrets.NEXUS_URL }}/react-build-${{ github.sha }}.zip

