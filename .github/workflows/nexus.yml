name: React Static CI/CD

on:
  workflow_dispatch:

jobs:

  build:
    runs-on: [self-hosted, macOS, react-2-do]

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci --verbose

      - name: Build React App
        run: npm run build
        env:
          CI: false

      - name: Package build
        run: |
          zip -r react-build-${{ github.sha }}.zip build

      - name: Upload to Nexus
        run: |
          curl -u ${{ secrets.NEXUS_USERNAME }}:${{ secrets.NEXUS_PASSWORD }} \
          --upload-file react-build-${{ github.sha }}.zip \
          ${{ secrets.NEXUS_URL }}/repository/react-builds/react-build-${{ github.sha }}.zip

      - name: Upload build artifact (GitHub)
        uses: actions/upload-artifact@v4
        with:
          name: react-build-${{ github.sha }}
          path: build


  deploy:
    runs-on: self-hosted
    needs: build

    steps:

      - name: Download artifact from Nexus
        run: |
          curl -u ${{ secrets.NEXUS_USERNAME }}:${{ secrets.NEXUS_PASSWORD }} \
          -o react-build.zip \
          ${{ secrets.NEXUS_URL }}/repository/react-builds/react-build-${{ github.sha }}.zip

      - name: Extract artifact
        run: |
          unzip react-build.zip
          ls -lah

