name: React CD - Local Agent Deploy

on:
  workflow_run:
    workflows: ["React Static CI"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    steps:
      - name: Download build artifact from CI run
        uses: actions/download-artifact@v4
        with:
          name: cicd-react-app-production-${{ github.event.workflow_run.head_sha }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: dist

      - name: Ensure target directory exists
        run: sudo mkdir -p /var/www/react-app

      - name: Clean old deployment
        run: sudo rm -rf /var/www/react-app/*

      - name: Deploy build files
        run: sudo cp -r dist/* /var/www/react-app/

      - name: Set correct permissions
        run: sudo chown -R www-data:www-data /var/www/react-app

      - name: Reload NGINX
        run: sudo systemctl reload nginx
