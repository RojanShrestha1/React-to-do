name: Sonartest react

on:
  workflow_dispatch:

jobs:
  build:
    # 'self-hosted' tells GitHub to use your Mac, not their cloud VMs
    # 'macOS' ensures it only picks your Mac if you have multiple runners
    runs-on: [self-hosted, macOS] 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # This works ONLY if SonarQube is running on this specific Mac
          SONAR_HOST_URL: http://localhost:9000
        with:
          args: >
              -Dsonar.projectKey=React_app